[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.auth-signup]
verify_jwt = true

[functions.submit-plan]
verify_jwt = true

[functions.check-plan-status]
verify_jwt = true

[functions.pay-for-plan]
verify_jwt = true

[functions.get-plan-content]
verify_jwt = true

[functions.update-profile]
verify_jwt = true

[functions.export-private-key]
verify_jwt = true

[functions.wallet-info]
verify_jwt = true

[functions.admin-update-pricing]
verify_jwt = true

[functions.admin-plans]
verify_jwt = true

[functions.poll-consensus]
verify_jwt = false
